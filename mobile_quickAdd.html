<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Locus">
  <meta name="theme-color" content="#D97757">
  <title>Locus</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='2' width='24' height='28' rx='4' fill='%23faf9f5' stroke='%23D97757' stroke-width='2'/%3E%3Crect x='8' y='0' width='16' height='5' rx='2.5' fill='%23D97757'/%3E%3Cpath d='M9 13l3 3 5-5' fill='none' stroke='%23D97757' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='20' y='12' width='5' height='2' rx='1' fill='%23c4c4c2'/%3E%3Crect x='9' y='20' width='10' height='2' rx='1' fill='%23c4c4c2'/%3E%3Crect x='9' y='25' width='7' height='2' rx='1' fill='%23c4c4c2'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23D97757'/%3E%3Ctext x='90' y='125' text-anchor='middle' font-size='100'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f5;
      --bg-card: #ffffff;
      --text: #141413;
      --text-sub: #5c5c5a;
      --text-muted: #8c8c8a;
      --accent: #D97757;
      --accent-hover: #c4684a;
      --border: #e5e4df;
      --shadow: rgba(20, 20, 19, 0.06);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    @supports (height: 100dvh) {
      html, body { height: 100dvh; }
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 0;
      padding-top: env(safe-area-inset-top, 0px);
      overflow: hidden;
    }

    /* === Header === */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon { font-size: 22px; line-height: 1; }
    .brand-name { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; color: var(--text); }

    .conn-status {
      font-size: 10px;
      color: var(--text-muted);
    }
    .conn-status .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 3px;
      vertical-align: middle;
    }
    .conn-status .dot.ok { background: #059669; }
    .conn-status .dot.err { background: #DC2626; }

    /* === Feed === */
    .feed {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 16px 16px;
    }

    .feed-empty {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .feed-date {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin: 20px 0 8px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .feed-date::before,
    .feed-date::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      margin: 4px 0;
      border-radius: 12px;
      font-size: 13px;
      animation: feedIn 0.25s ease-out;
    }

    .feed-item.capture {
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    .feed-item.action {
      background: transparent;
      color: var(--text-sub);
      font-size: 12px;
      padding: 6px 12px;
    }

    .feed-icon {
      flex-shrink: 0;
      width: 18px;
      text-align: center;
      font-size: 13px;
    }

    .feed-body {
      flex: 1;
      min-width: 0;
    }

    .feed-title {
      line-height: 1.4;
      word-break: break-word;
    }

    .feed-labels {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .feed-time {
      flex-shrink: 0;
      font-size: 10px;
      color: var(--text-muted);
      margin-left: auto;
      padding-top: 2px;
    }

    .feed-action-label {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-right: 4px;
    }

    .feed-item.action .feed-title.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    @keyframes feedIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* === Input Dock === */
    .input-dock {
      flex-shrink: 0;
      padding: 8px 16px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 8px));
      background: var(--bg);
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 8px var(--shadow);
    }

    .status-toast {
      text-align: center;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.2s;
    }

    .status-toast.visible {
      height: 24px;
      line-height: 24px;
      opacity: 1;
      margin-bottom: 4px;
    }

    .picker-section {
      margin-bottom: 6px;
    }

    .picker-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .picker-chip {
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      padding: 4px 10px;
      border-radius: 16px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-appearance: none;
    }

    .picker-chip.selected {
      border-color: var(--chip-color, #7C3AED);
      background: var(--chip-color, #7C3AED);
      color: white;
    }

    .picker-chip:active { transform: scale(0.96); }

    .input-row {
      margin-bottom: 6px;
    }

    .input-row input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      font-family: inherit;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--bg-card);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--text-muted); }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .action-buttons button {
      flex: 1;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border: 2px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-appearance: none;
    }

    .action-buttons button:active { transform: scale(0.96); }
    .action-buttons button:disabled { opacity: 0.4; pointer-events: none; }

    .action-buttons button.highlighted {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .action-buttons button.highlighted:active { background: var(--accent-hover); }

    .action-buttons button.dimmed {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }
    .action-buttons button.dimmed:active { background: var(--bg); }

    /* === Detail Pane (Slack thread style) === */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .detail-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-pane {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 85%;
      max-width: 360px;
      background: var(--bg);
      z-index: 101;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 20px rgba(0,0,0,0.1);
    }
    .detail-pane.open {
      transform: translateX(0);
    }

    .detail-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .detail-header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-sub);
    }

    .detail-close {
      font-size: 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      font-family: inherit;
      -webkit-appearance: none;
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
    }

    .detail-field {
      margin-bottom: 16px;
    }

    .detail-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }

    .detail-field textarea,
    .detail-field input[type="text"] {
      width: 100%;
      font-size: 14px;
      font-family: inherit;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg-card);
      color: var(--text);
      outline: none;
      resize: vertical;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    .detail-field textarea:focus,
    .detail-field input[type="text"]:focus {
      border-color: var(--accent);
    }

    .detail-field textarea {
      min-height: 80px;
    }

    .detail-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .detail-meta {
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px 0;
    }

    .detail-actions {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .detail-actions button {
      flex: 1;
      padding: 10px 0;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg-card);
      color: var(--text-sub);
      cursor: pointer;
      -webkit-appearance: none;
      transition: all 0.15s;
    }

    .detail-actions button:active { transform: scale(0.96); }

    .detail-actions button.danger {
      color: #DC2626;
      border-color: #FEE2E2;
    }

    .detail-save-status {
      font-size: 11px;
      color: var(--accent);
      text-align: center;
      height: 16px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .detail-save-status.visible { opacity: 1; }
  </style>
</head>
<body>

  <!-- ZONE 1: Header -->
  <div class="header">
    <div class="brand">
      <span class="brand-icon">🔥</span>
      <span class="brand-name">Locus</span>
    </div>
    <div class="conn-status" id="connStatus"></div>
  </div>

  <!-- ZONE 2: Activity Feed -->
  <div class="feed" id="activityFeed">
    <div class="feed-empty" id="feedEmpty">최근 7일간 활동이 없습니다</div>
  </div>

  <!-- Detail Pane -->
  <div class="detail-overlay" id="detailOverlay"></div>
  <div class="detail-pane" id="detailPane">
    <div class="detail-header">
      <span class="detail-header-title" id="detailHeaderTitle"></span>
      <button class="detail-close" id="detailClose">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-actions" id="detailActions"></div>
  </div>

  <!-- ZONE 3: Input Dock -->
  <div class="input-dock" id="inputDock">
    <div class="status-toast" id="statusToast"></div>

    <div class="picker-section" id="epicSection">
      <div class="picker-chips" id="epicChips"></div>
    </div>
    <div class="picker-section" id="questSection" style="display:none;">
      <div class="picker-chips" id="questChips"></div>
    </div>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="할 일 또는 아이디어를 입력하세요" enterkeyhint="send" autocomplete="off" autofocus>
    </div>

    <div class="action-buttons">
      <button id="addBtn" disabled>✓ 할일</button>
      <button id="ideaBtn" disabled>💡 아이디어</button>
    </div>
  </div>

<script>
  // ===== Supabase =====
  const SUPABASE_URL = 'https://cuqvmtpmubawuedfcmyd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1cXZtdHBtdWJhd3VlZGZjbXlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1NjAxMDcsImV4cCI6MjA4NzEzNjEwN30.u6ai_HWzGo5SHeHHb96bZDVwcvyMz9yxqft3ZnvRTqo';

  let sb = null;
  try { sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null; }
  catch(e) { console.log('Supabase init failed:', e); }

  // ===== Elements =====
  const taskInput = document.getElementById('taskInput');
  const addBtn = document.getElementById('addBtn');
  const ideaBtn = document.getElementById('ideaBtn');
  const statusToast = document.getElementById('statusToast');
  const connStatus = document.getElementById('connStatus');
  const activityFeed = document.getElementById('activityFeed');
  const feedEmpty = document.getElementById('feedEmpty');

  const epicChipsEl = document.getElementById('epicChips');
  const questChipsEl = document.getElementById('questChips');
  const questSection = document.getElementById('questSection');

  // ===== Local state =====
  const LS_KEY = 'locus_mobile_today';
  let defaultSection = null;
  let quests = [];
  let selectedEpic = null;
  let selectedQuestId = null;

  const epicColors = {
    VD: { bg: '#EDE9FE', color: '#7C3AED', label: 'VOID DIVER' },
    CQ: { bg: '#FEF3C7', color: '#D97706', label: 'CQ' },
    AI: { bg: '#DBEAFE', color: '#2563EB', label: 'AI' },
    BIZ: { bg: '#FEE2E2', color: '#DC2626', label: 'BIZ' },
    TEAM: { bg: '#D1FAE5', color: '#059669', label: 'TEAM' },
    PERSONAL: { bg: '#F3F4F6', color: '#6B7280', label: 'PERSONAL' },
  };

  // ===== Date utilities =====
  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function dateKeyOffset(offsetDays) {
    const d = new Date();
    d.setDate(d.getDate() + offsetDays);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function formatDateHeader(dateKey) {
    const d = new Date(dateKey + 'T00:00:00');
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    const today = todayKey();
    const yesterday = dateKeyOffset(-1);
    if (dateKey === today) return '오늘';
    if (dateKey === yesterday) return '어제';
    return `${d.getMonth()+1}/${d.getDate()} ${dayNames[d.getDay()]}`;
  }

  // UTC → 로컬 시간 변환
  function toLocalTS(utcStr) {
    const d = new Date(utcStr);
    const y = d.getFullYear();
    const mo = String(d.getMonth()+1).padStart(2,'0');
    const da = String(d.getDate()).padStart(2,'0');
    const h = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    const s = String(d.getSeconds()).padStart(2,'0');
    return `${y}-${mo}-${da}T${h}:${mi}:${s}`;
  }

  // ===== localStorage =====
  function loadTodayItems() {
    try {
      const stored = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      return stored[todayKey()] || [];
    } catch(e) { return []; }
  }

  function saveTodayItems(items) {
    try {
      const stored = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      stored[todayKey()] = items;
      // 7일 초과 데이터 정리
      const cutoff = dateKeyOffset(-7);
      Object.keys(stored).forEach(k => { if (k < cutoff) delete stored[k]; });
      localStorage.setItem(LS_KEY, JSON.stringify(stored));
    } catch(e) {}
  }

  // ===== Feed data =====
  const ACTION_ICONS = {
    '완료': '✓', '미완료': '↩', '삭제': '✕', '이동': '↔',
    '인박스': '▦', '일정': '◆', '전환': '⇧', '마일스톤': '◇',
    'ASAP': '▦', 'Schedule': '▦', 'Someday': '▦',
    '퀘스트': '◇', '기본': '•'
  };

  function getActionIcon(action) {
    for (const [key, icon] of Object.entries(ACTION_ICONS)) {
      if (action.includes(key)) return icon;
    }
    return '•';
  }

  let feedCache = [];

  async function loadFeedFromSupabase() {
    if (!sb) return;
    const feedItems = [];
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 7);
    const cutoffISO = cutoff.toISOString();
    const cutoffId = cutoff.getTime();

    // Source 1: Tasks (id는 Date.now() 기반)
    try {
      const { data: taskData } = await sb.from('tasks')
        .select('id, title, tags, checked, milestone_id, created_at')
        .gte('id', cutoffId)
        .order('id', { ascending: true });
      if (taskData) {
        taskData.forEach(t => {
          const ts = toLocalTS(t.created_at || new Date(t.id).toISOString());
          const dateKey = ts.slice(0, 10);
          const epicKey = (t.tags && t.tags[0]) || '';
          const epicLabel = epicKey ? (epicColors[epicKey]?.label || epicKey) : '';
          const quest = t.milestone_id ? (quests.find(q => q.id === t.milestone_id)?.title || '') : '';
          feedItems.push({
            source: 'capture', ts, dateKey,
            type: 'task', title: t.title,
            epic: epicLabel, quest,
            id: t.id, checked: t.checked,
          });
        });
      }
    } catch(e) { console.log('Feed tasks error:', e); }

    // Source 2: Ideas (created_at 기반)
    try {
      const { data: ideaData } = await sb.from('ideas')
        .select('id, content, source_url, tags, status, created_at')
        .gte('created_at', cutoffISO)
        .eq('status', 'active')
        .order('created_at', { ascending: true });
      if (ideaData) {
        ideaData.forEach(i => {
          const ts = toLocalTS(i.created_at);
          const dateKey = ts.slice(0, 10);
          const epicKey = (i.tags && i.tags[0]) || '';
          const epicLabel = epicKey ? (epicColors[epicKey]?.label || epicKey) : '';
          feedItems.push({
            source: 'capture', ts, dateKey,
            type: 'idea', title: i.content,
            epic: epicLabel, quest: '',
            id: i.id,
          });
        });
      }
    } catch(e) { console.log('Feed ideas error:', e); }

    // Source 3: 로컬 액션 로그 (같은 브라우저면 보너스)
    try {
      const actionLog = JSON.parse(localStorage.getItem('dashboardActionLog') || '[]');
      const cutoffDateKey = dateKeyOffset(-7);
      actionLog.forEach(entry => {
        const dateKey = entry.ts.slice(0, 10);
        if (dateKey < cutoffDateKey) return;
        feedItems.push({
          source: 'action', ts: entry.ts, dateKey,
          action: entry.action, title: entry.title || '',
        });
      });
    } catch(e) {}

    feedItems.sort((a, b) => a.ts.localeCompare(b.ts));
    feedCache = feedItems;
  }

  // ===== Feed rendering =====
  function renderFeed(scrollToBottom = true) {
    const items = feedCache;

    // 기존 아이템 제거
    activityFeed.querySelectorAll('.feed-date, .feed-item').forEach(el => el.remove());

    if (items.length === 0) {
      feedEmpty.style.display = 'block';
      return;
    }

    feedEmpty.style.display = 'none';
    const frag = document.createDocumentFragment();
    let currentDate = null;

    items.forEach(item => {
      // 날짜 헤더
      if (item.dateKey !== currentDate) {
        currentDate = item.dateKey;
        const dh = document.createElement('div');
        dh.className = 'feed-date';
        dh.textContent = formatDateHeader(item.dateKey);
        frag.appendChild(dh);
      }

      const row = document.createElement('div');
      const hm = item.ts.slice(11, 16);

      if (item.source === 'capture') {
        row.className = 'feed-item capture';
        const isChecked = item.checked;
        const icon = item.type === 'idea' ? '💡' : (isChecked ? '✓' : '☐');
        const labels = [item.epic, item.quest].filter(Boolean).join(' / ');
        const labelHtml = labels ? `<div class="feed-labels">${escHtml(labels)}</div>` : '';
        const titleClass = isChecked ? ' done' : '';
        row.innerHTML =
          `<span class="feed-icon">${icon}</span>` +
          `<div class="feed-body"><div class="feed-title${titleClass}">${escHtml(item.title)}</div>${labelHtml}</div>` +
          `<span class="feed-time">${hm}</span>`;
        if (isChecked) row.style.opacity = '0.5';
        row.style.cursor = 'pointer';
        row.addEventListener('click', () => openDetail(item));
      } else {
        row.className = 'feed-item action';
        const icon = getActionIcon(item.action);
        const isDone = item.action === '완료';
        row.innerHTML =
          `<span class="feed-icon">${icon}</span>` +
          `<span class="feed-action-label">${escHtml(item.action)}</span>` +
          `<span class="feed-title${isDone ? ' done' : ''}">${escHtml(item.title)}</span>` +
          `<span class="feed-time">${hm}</span>`;
      }

      frag.appendChild(row);
    });

    activityFeed.insertBefore(frag, feedEmpty);

    if (scrollToBottom) {
      requestAnimationFrame(() => {
        activityFeed.scrollTop = activityFeed.scrollHeight;
      });
    }
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ===== Detail Pane =====
  const detailOverlay = document.getElementById('detailOverlay');
  const detailPane = document.getElementById('detailPane');
  const detailBody = document.getElementById('detailBody');
  const detailActions = document.getElementById('detailActions');
  const detailHeaderTitle = document.getElementById('detailHeaderTitle');
  const detailClose = document.getElementById('detailClose');

  let detailSaveTimer = null;

  function openDetail(feedItem) {
    if (!sb) return;
    if (feedItem.type === 'task') {
      loadTaskDetail(feedItem.id);
    } else if (feedItem.type === 'idea') {
      loadIdeaDetail(feedItem.id);
    }
  }

  async function loadTaskDetail(taskId) {
    detailHeaderTitle.textContent = '할일 상세';
    detailBody.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">로딩...</div>';
    detailActions.innerHTML = '';
    showPane();

    try {
      const { data } = await sb.from('tasks').select('*').eq('id', taskId).single();
      if (!data) { detailBody.innerHTML = '<div style="padding:20px;color:var(--text-muted);">데이터를 찾을 수 없습니다</div>'; return; }
      renderTaskDetail(data);
    } catch(e) {
      detailBody.innerHTML = '<div style="padding:20px;color:var(--text-muted);">로드 실패</div>';
    }
  }

  function renderTaskDetail(task) {
    detailBody.innerHTML = '';

    // Title
    const titleField = makeField('제목');
    const titleInput = document.createElement('input');
    titleInput.type = 'text';
    titleInput.value = task.title || '';
    titleInput.addEventListener('input', () => {
      task.title = titleInput.value;
      scheduleDetailSave('task', task);
    });
    titleField.appendChild(titleInput);
    detailBody.appendChild(titleField);

    // Note
    const noteField = makeField('노트');
    const noteArea = document.createElement('textarea');
    noteArea.value = task.note || '';
    noteArea.placeholder = '메모 추가...';
    noteArea.addEventListener('input', () => {
      task.note = noteArea.value;
      scheduleDetailSave('task', task);
    });
    noteField.appendChild(noteArea);
    detailBody.appendChild(noteField);

    // Epic tags
    const tagField = makeField('에픽');
    const tagChips = document.createElement('div');
    tagChips.className = 'detail-chips';
    const currentTags = task.tags || [];
    Object.entries(epicColors).forEach(([key, ec]) => {
      const chip = document.createElement('button');
      chip.className = 'picker-chip' + (currentTags.includes(key) ? ' selected' : '');
      chip.textContent = ec.label;
      chip.style.setProperty('--chip-color', ec.color);
      chip.addEventListener('click', () => {
        const idx = task.tags.indexOf(key);
        if (idx >= 0) { task.tags.splice(idx, 1); chip.classList.remove('selected'); }
        else { task.tags = [key]; tagChips.querySelectorAll('.picker-chip').forEach(c => c.classList.remove('selected')); chip.classList.add('selected'); }
        scheduleDetailSave('task', task);
      });
      tagChips.appendChild(chip);
    });
    // + 새 에픽
    const addEpicChip = document.createElement('button');
    addEpicChip.className = 'picker-chip';
    addEpicChip.textContent = '+';
    addEpicChip.style.cssText = 'min-width:32px;font-size:14px;';
    addEpicChip.addEventListener('click', () => {
      const name = prompt('새 에픽 이름 (영문 대문자)');
      if (!name || !name.trim()) return;
      const key = name.trim().toUpperCase();
      if (!epicColors[key]) {
        const presetColors = ['#7C3AED','#D97706','#2563EB','#DC2626','#059669','#6B7280','#DB2777','#0891B2'];
        const color = presetColors[Object.keys(epicColors).length % presetColors.length];
        epicColors[key] = { bg: color + '20', color, label: key };
      }
      task.tags = [key];
      scheduleDetailSave('task', task);
      renderTaskDetail(task);
    });
    tagChips.appendChild(addEpicChip);
    tagField.appendChild(tagChips);
    detailBody.appendChild(tagField);

    // Quest
    {
      const qField = makeField('퀘스트');
      const qChips = document.createElement('div');
      qChips.className = 'detail-chips';
      const epicFilter = (task.tags && task.tags[0]) || null;
      const filtered = epicFilter ? quests.filter(q => q.epic === epicFilter) : quests;
      filtered.forEach(q => {
        const chip = document.createElement('button');
        chip.className = 'picker-chip' + (task.milestone_id === q.id ? ' selected' : '');
        chip.textContent = q.title;
        chip.style.setProperty('--chip-color', q.color || '#7C3AED');
        chip.addEventListener('click', () => {
          if (task.milestone_id === q.id) { task.milestone_id = null; chip.classList.remove('selected'); }
          else { task.milestone_id = q.id; qChips.querySelectorAll('.picker-chip').forEach(c => c.classList.remove('selected')); chip.classList.add('selected'); }
          scheduleDetailSave('task', task);
        });
        qChips.appendChild(chip);
      });
      // + 새 퀘스트
      const addQuestChip = document.createElement('button');
      addQuestChip.className = 'picker-chip';
      addQuestChip.textContent = '+';
      addQuestChip.style.cssText = 'min-width:32px;font-size:14px;';
      addQuestChip.addEventListener('click', async () => {
        const title = prompt('새 퀘스트 이름');
        if (!title || !title.trim()) return;
        const epicKey = (task.tags && task.tags[0]) || null;
        const color = epicKey && epicColors[epicKey] ? epicColors[epicKey].color : '#7C3AED';
        const newId = 'm' + Date.now();
        const { error } = await sb.from('quests').insert([{
          id: newId, epic: epicKey, title: title.trim(),
          color, show_on_compass: true, position: quests.length
        }]);
        if (error) { showToast('생성 실패'); return; }
        quests.push({ id: newId, title: title.trim(), epic: epicKey, color, completed: false });
        task.milestone_id = newId;
        scheduleDetailSave('task', task);
        renderTaskDetail(task);
      });
      qChips.appendChild(addQuestChip);
      qField.appendChild(qChips);
      detailBody.appendChild(qField);
    }

    // Save status
    const saveStatus = document.createElement('div');
    saveStatus.className = 'detail-save-status';
    saveStatus.id = 'detailSaveStatus';
    detailBody.appendChild(saveStatus);

    // Actions
    detailActions.innerHTML = '';
    const doneBtn = document.createElement('button');
    doneBtn.textContent = task.checked ? '↩ 미완료' : '✓ 완료';
    doneBtn.addEventListener('click', async () => {
      task.checked = !task.checked;
      await sb.from('tasks').update({ checked: task.checked }).eq('id', task.id);
      closePane();
      showToast(task.checked ? '완료 처리됨' : '미완료로 변경');
    });
    detailActions.appendChild(doneBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'danger';
    delBtn.textContent = '삭제';
    delBtn.addEventListener('click', async () => {
      if (!confirm('이 할일을 삭제할까요?')) return;
      await sb.from('tasks').delete().eq('id', task.id);
      // localStorage에서도 제거
      removeFromLocal(task.id);
      closePane();
      renderFeed();
      showToast('삭제됨');
    });
    detailActions.appendChild(delBtn);
  }

  async function loadIdeaDetail(ideaId) {

  function makeField(label) {
    const div = document.createElement('div');
    div.className = 'detail-field';
    const lbl = document.createElement('div');
    lbl.className = 'detail-label';
    lbl.textContent = label;
    div.appendChild(lbl);
    return div;
  }

  function scheduleDetailSave(type, data) {
    clearTimeout(detailSaveTimer);
    detailSaveTimer = setTimeout(async () => {
      try {
        if (type === 'task') {
          await sb.from('tasks').update({
            title: data.title, note: data.note, tags: data.tags, milestone_id: data.milestone_id
          }).eq('id', data.id);
        } else {
          await sb.from('ideas').update({
            content: data.content, source_url: data.source_url, note: data.note, tags: data.tags, milestone_id: data.milestone_id
          }).eq('id', data.id);
        }
        const ss = document.getElementById('detailSaveStatus');
        if (ss) { ss.textContent = '저장됨'; ss.classList.add('visible'); setTimeout(() => ss.classList.remove('visible'), 1200); }
      } catch(e) { console.error('Detail save error:', e); }
    }, 500);
  }

  function removeFromLocal(id) {
    try {
      const stored = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      Object.keys(stored).forEach(dateKey => {
        stored[dateKey] = stored[dateKey].filter(item => item.id !== id);
      });
      localStorage.setItem(LS_KEY, JSON.stringify(stored));
    } catch(e) {}
  }

  function showPane() {
    detailOverlay.classList.add('open');
    detailPane.classList.add('open');
  }

  function closePane() {
    detailOverlay.classList.remove('open');
    detailPane.classList.remove('open');
  }

  detailClose.addEventListener('click', closePane);
  detailOverlay.addEventListener('click', closePane);

  // ===== Init =====
  async function init() {
    if (!sb) {
      connStatus.innerHTML = '<span class="dot err"></span>오프라인';
      feedEmpty.textContent = '서버 연결이 필요합니다';
      feedEmpty.style.display = 'block';
      return;
    }

    feedEmpty.textContent = '로딩 중...';
    feedEmpty.style.display = 'block';

    try {
      const { data: secs } = await sb.from('sections').select('id, name').order('position').limit(1);
      if (secs && secs.length > 0) {
        defaultSection = secs[0].id;
        connStatus.innerHTML = '<span class="dot ok"></span>연결됨';
      } else {
        connStatus.innerHTML = '<span class="dot err"></span>섹션 없음';
      }
    } catch(e) {
      connStatus.innerHTML = '<span class="dot err"></span>연결 실패';
    }

    try {
      const { data: qData } = await sb.from('quests').select('id, title, epic, color, completed').order('position');
      if (qData) {
        quests = qData.filter(q => !q.completed);
        renderEpicChips();
      }
    } catch(e) { console.log('Quest load error:', e); }

    // 퀘스트 로드 후 피드 로드 (퀘스트명 표시를 위해)
    await loadFeedFromSupabase();
    renderFeed();
  }

  // ===== Epic / Quest chips =====
  function renderEpicChips() {
    epicChipsEl.innerHTML = '';
    const epics = [...new Set(quests.map(q => q.epic).filter(Boolean))];

    epics.forEach(epic => {
      const ec = epicColors[epic] || { bg: '#F3F4F6', color: '#6B7280', label: epic };
      const chip = document.createElement('button');
      chip.className = 'picker-chip';
      chip.textContent = ec.label;
      chip.style.setProperty('--chip-color', ec.color);
      chip.addEventListener('click', () => {
        if (selectedEpic === epic) {
          selectedEpic = null;
          selectedQuestId = null;
          chip.classList.remove('selected');
          questSection.style.display = 'none';
        } else {
          selectedEpic = epic;
          selectedQuestId = null;
          epicChipsEl.querySelectorAll('.picker-chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
          renderQuestChips(epic);
        }
      });
      epicChipsEl.appendChild(chip);
    });
  }

  function renderQuestChips(epic) {
    questChipsEl.innerHTML = '';
    const filtered = quests.filter(q => q.epic === epic);
    if (filtered.length === 0) { questSection.style.display = 'none'; return; }
    questSection.style.display = 'block';
    filtered.forEach(q => {
      const chip = document.createElement('button');
      chip.className = 'picker-chip';
      chip.textContent = q.title;
      chip.style.setProperty('--chip-color', q.color || '#7C3AED');
      chip.addEventListener('click', () => {
        if (selectedQuestId === q.id) {
          selectedQuestId = null;
          chip.classList.remove('selected');
        } else {
          selectedQuestId = q.id;
          questChipsEl.querySelectorAll('.picker-chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
        }
      });
      questChipsEl.appendChild(chip);
    });
  }

  // ===== Add task =====
  async function addTask() {
    const title = taskInput.value.trim();
    if (!title) return;
    if (!sb || !defaultSection) {
      showToast('Supabase 연결이 필요합니다');
      return;
    }

    addBtn.disabled = true;
    ideaBtn.disabled = true;
    taskInput.disabled = true;

    const taskId = Math.round(Date.now() + Math.random() * 1000);
    const now = new Date();
    const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    try {
      const { data: existing } = await sb.from('tasks').select('position').eq('section', defaultSection).order('position', { ascending: false }).limit(1);
      const nextPos = (existing && existing.length > 0) ? existing[0].position + 1 : 0;

      const { error } = await sb.from('tasks').insert({
        id: taskId, title, section: defaultSection,
        checked: false, note: '',
        tags: selectedEpic ? [selectedEpic] : [],
        url: '', scheduled_date: null, plan_bucket: null,
        position: nextPos, milestone_id: selectedQuestId,
      });

      if (error) throw error;

      const items = loadTodayItems();
      const epicLabel = selectedEpic ? (epicColors[selectedEpic]?.label || selectedEpic) : '';
      const questName = selectedQuestId ? (quests.find(q => q.id === selectedQuestId)?.title || '') : '';
      items.push({ title, time: timeStr, id: taskId, type: 'task', epic: epicLabel, quest: questName });
      saveTodayItems(items);

      taskInput.value = '';
      selectedEpic = null;
      selectedQuestId = null;
      epicChipsEl.querySelectorAll('.picker-chip').forEach(c => c.classList.remove('selected'));
      questSection.style.display = 'none';
      showToast('추가 완료');
      await loadFeedFromSupabase();
      renderFeed();
    } catch(e) {
      console.error('Save error:', e);
      showToast('저장 실패 — 다시 시도해주세요');
    }

    taskInput.disabled = false;
    addBtn.disabled = false;
    ideaBtn.disabled = false;
    taskInput.focus();
  }

  // ===== Add idea =====
  async function addIdea() {
    const content = taskInput.value.trim();
    if (!content) return;
    if (!sb) {
      showToast('Supabase 연결이 필요합니다');
      return;
    }

    addBtn.disabled = true;
    ideaBtn.disabled = true;
    taskInput.disabled = true;

    const ideaId = Math.round(Date.now() + Math.random() * 1000);
    const now = new Date();
    const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    const isUrl = /^https?:\/\//i.test(content);
    const sourceUrl = isUrl ? content : '';

    try {
      const { error } = await sb.from('ideas').insert({
        id: ideaId, content, source_url: sourceUrl, status: 'active',
      });

      if (error) throw error;

      const items = loadTodayItems();
      items.push({ title: content, time: timeStr, id: ideaId, type: 'idea' });
      saveTodayItems(items);

      taskInput.value = '';
      showToast('아이디어 저장 완료');
      await loadFeedFromSupabase();
      renderFeed();
    } catch(e) {
      console.error('Idea save error:', e);
      showToast('저장 실패 — 다시 시도해주세요');
    }

    taskInput.disabled = false;
    addBtn.disabled = false;
    ideaBtn.disabled = false;
    taskInput.focus();
  }

  // ===== Toast =====
  let toastTimer;
  function showToast(msg) {
    statusToast.textContent = msg;
    statusToast.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => statusToast.classList.remove('visible'), 1800);
  }

  // ===== Events =====
  function looksActionable(text) {
    if (/^https?:\/\//i.test(text) || /^www\./i.test(text)) return false;
    if (/\?\s*$/.test(text)) return false;
    if (/면\s*(어떨까|좋겠|될까)|해볼까|일수도|것\s*같|아닐까|싶다|듯$/.test(text)) return false;
    return true;
  }

  function updateButtonHighlight() {
    const text = taskInput.value.trim();
    const hasText = !!text;
    addBtn.disabled = !hasText;
    ideaBtn.disabled = !hasText;

    if (!hasText) {
      addBtn.className = '';
      ideaBtn.className = '';
      return;
    }

    const isIdea = !looksActionable(text);
    if (isIdea) {
      ideaBtn.className = 'highlighted';
      addBtn.className = 'dimmed';
    } else {
      addBtn.className = 'highlighted';
      ideaBtn.className = 'dimmed';
    }
  }

  taskInput.addEventListener('input', updateButtonHighlight);

  taskInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && taskInput.value.trim()) {
      e.preventDefault();
      if (ideaBtn.classList.contains('highlighted')) {
        addIdea();
      } else {
        addTask();
      }
    }
  });

  addBtn.addEventListener('click', addTask);
  ideaBtn.addEventListener('click', addIdea);

  // ===== iOS keyboard handling =====
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      const dock = document.getElementById('inputDock');
      const offset = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
      dock.style.paddingBottom = Math.max(8, offset) + 'px';
      activityFeed.scrollTop = activityFeed.scrollHeight;
    });
  }

  // ===== PWA SW =====
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  init();
</script>
</body>
</html>
